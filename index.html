<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DAILY CHRONICLE | Canlı Haber Akışı</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #121212; }
        .serif { font-family: 'Playfair Display', serif; }
        .article-card:hover h2 { color: #8B0000; }
        .loading-shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .live-dot { width: 8px; height: 8px; background-color: #8B0000; border-radius: 50%; display: inline-block; margin-right: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } 100% { transform: scale(1); opacity: 1; } }
        .nav-link.active { color: #8B0000; border-bottom: 2px solid #8B0000; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        #alert-box { display: none; pointer-events: none; }
        
        /* Modal Stilleri */
        #news-modal { display: none; transition: opacity 0.3s ease; }
        .modal-content { max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Bağlantı Uyarı Kutusu -->
    <div id="alert-box" class="fixed top-4 right-4 bg-black text-white p-4 text-[10px] font-bold z-50 shadow-2xl serif italic border-l-4 border-red-600">
        MOD: ÇEVRİMDIŞI ARŞİV VERİLERİ GÖSTERİLİYOR.
    </div>

    <!-- Haber Detay Modalı -->
    <div id="news-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-white max-w-3xl w-full rounded-lg shadow-2xl relative overflow-hidden flex flex-col modal-content">
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-white/90 hover:bg-white p-2 rounded-full shadow-md z-10 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <div id="modal-body" class="p-0">
                <!-- İçerik JavaScript ile dolacak -->
            </div>
        </div>
    </div>

    <header class="max-w-7xl mx-auto text-center border-b border-black pb-4">
        <div class="text-xs uppercase tracking-widest mb-2 font-semibold" id="current-date">YÜKLENİYOR...</div>
        <h1 class="serif text-5xl md:text-7xl font-black tracking-tighter mb-4">THE DAILY CHRONICLE</h1>
        <nav id="main-nav" class="flex flex-wrap justify-center gap-6 border-t border-gray-300 pt-4 text-xs font-bold uppercase tracking-wider">
            <a href="#" data-category="general" class="nav-link active hover:text-red-800 transition">Gündem</a>
            <a href="#" data-category="business" class="nav-link hover:text-red-800 transition">Ekonomi</a>
            <a href="#" data-category="technology" class="nav-link hover:text-red-800 transition">Teknoloji</a>
            <a href="#" data-category="science" class="nav-link hover:text-red-800 transition">Bilim</a>
            <a href="#" data-category="health" class="nav-link hover:text-red-800 transition">Sağlık</a>
            <a href="#" data-category="entertainment" class="nav-link hover:text-red-800 transition">Magazin</a>
            <a href="#" data-category="sports" class="nav-link hover:text-red-800 transition">Spor</a>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto mt-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        <section class="lg:col-span-3">
            <div class="flex items-center justify-between border-b-2 border-black mb-6 pb-2">
                <h2 id="category-title" class="serif text-2xl font-bold italic uppercase">Gündem</h2>
                <button onclick="refreshCurrentCategory()" class="text-xs bg-black text-white px-3 py-1 hover:bg-red-900 transition uppercase tracking-tighter">Yenile</button>
            </div>

            <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div class="space-y-4"><div class="h-64 loading-shimmer w-full"></div><div class="h-8 loading-shimmer w-3/4"></div></div>
                <div class="space-y-4"><div class="h-64 loading-shimmer w-full"></div><div class="h-8 loading-shimmer w-3/4"></div></div>
            </div>
        </section>

        <aside class="lg:col-span-1 border-l border-gray-200 pl-0 lg:pl-8">
            <div class="border-b-2 border-black mb-6 pb-2">
                <h2 class="serif text-xl font-bold"><span class="live-dot"></span>ANLIK AKIŞ</h2>
            </div>
            <div id="live-ticker" class="space-y-6">
                <p class="text-sm text-gray-500 italic">Veriler taranıyor...</p>
            </div>
        </aside>
    </main>

    <footer class="max-w-7xl mx-auto mt-20 pt-8 border-t border-gray-300 text-center text-xs text-gray-500 pb-10">
        <p>© 2026 The Daily Chronicle. Tüm hakları saklıdır. Haberler NewsAPI (veya yedek sunucu) üzerinden taranmaktadır.</p>
    </footer>

    <script>
        const API_KEY = '5f4c6e9e4f5d4a1b9c8d7e6f5a4b3c2d'; 
        const newsContainer = document.getElementById('news-container');
        const liveTicker = document.getElementById('live-ticker');
        const dateElement = document.getElementById('current-date');
        const categoryTitle = document.getElementById('category-title');
        const navLinks = document.querySelectorAll('.nav-link');
        const alertBox = document.getElementById('alert-box');
        const modal = document.getElementById('news-modal');
        const modalBody = document.getElementById('modal-body');

        let currentCategory = 'general';
        let articlesList = [];

        dateElement.innerText = new Date().toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                navLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                currentCategory = link.getAttribute('data-category');
                categoryTitle.innerText = link.innerText;
                fetchNews(currentCategory);
            });
        });

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            if (event.target == modal) {
                closeModal();
            }
        }

        function openArticle(index) {
            const article = articlesList[index];
            if (!article) return;

            const imageUrl = article.urlToImage || `https://images.unsplash.com/photo-1585829365234-781fcd50c819?auto=format&fit=crop&w=800&q=60`;
            const date = new Date(article.publishedAt).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            modalBody.innerHTML = `
                <img src="${imageUrl}" class="w-full h-80 object-cover" onerror="this.src='https://via.placeholder.com/800x500/f3f4f6/374151?text=Haber+Gorseli'">
                <div class="p-8">
                    <div class="flex items-center gap-3 mb-4">
                        <span class="bg-red-900 text-white text-[10px] font-bold px-2 py-1 uppercase tracking-widest">${article.source.name || 'Haber'}</span>
                        <span class="text-xs text-gray-400 font-medium">${date}</span>
                    </div>
                    <h2 class="serif text-3xl md:text-4xl font-bold leading-tight mb-6">${article.title}</h2>
                    <div class="prose max-w-none text-gray-800 leading-relaxed text-lg">
                        <p class="mb-6 font-semibold text-gray-600 italic">"${article.description || 'Bu haber için kısa özet mevcut değil.'}"</p>
                        <p class="mb-4">${article.content ? article.content.split('[+')[0] : 'Haberin detaylı içeriği şu anda Chronicle merkezi tarafından işleniyor. Bölgedeki muhabirlerimizden gelen son dakika bilgilerine göre olay yerinde incelemeler sürüyor.'}</p>
                        <p>Daha fazla bilgi ve canlı yayın takibi için ana sayfamızdaki diğer haberlere göz atabilirsiniz. Chronicle, doğru bilgiyi en hızlı şekilde ulaştırmak için çalışıyor.</p>
                    </div>
                    <div class="mt-10 pt-6 border-t border-gray-100 flex justify-between items-center">
                        <p class="text-xs text-gray-400 italic">Editör: Chronicle News Team</p>
                        <button onclick="window.open('${article.url}', '_blank')" class="text-sm font-bold text-red-900 hover:underline">Orijinal Kaynak →</button>
                    </div>
                </div>
            `;
            
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        async function fetchNews(category = 'general') {
            newsContainer.innerHTML = `
                <div class="space-y-4"><div class="h-64 loading-shimmer w-full"></div><div class="h-8 loading-shimmer w-3/4"></div></div>
                <div class="space-y-4"><div class="h-64 loading-shimmer w-full"></div><div class="h-8 loading-shimmer w-3/4"></div></div>
            `;
            
            const url = `https://newsapi.org/v2/top-headlines?country=us&category=${category}&apiKey=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP Hata: ${response.status}`);
                
                const data = await response.json();
                
                if (data.status === 'ok' && data.articles && data.articles.length > 0) {
                    alertBox.style.display = 'none';
                    articlesList = data.articles;
                    renderNews(articlesList);
                } else {
                    throw new Error('API verisi boş döndü.');
                }
            } catch (error) {
                console.warn("Gerçek Zamanlı Haber Akışı Kesildi (Simülasyon Aktif):", error.message);
                alertBox.style.display = 'block';
                generateDynamicMockNews(category);
            }
        }

        function renderNews(articles) {
            newsContainer.innerHTML = '';
            liveTicker.innerHTML = '';

            articles.forEach((article, index) => {
                const imageUrl = article.urlToImage || `https://images.unsplash.com/photo-1585829365234-781fcd50c819?auto=format&fit=crop&w=800&q=60`;

                if (index < 8) {
                    newsContainer.innerHTML += `
                        <article class="article-card group cursor-pointer border-b border-gray-200 pb-8 last:border-0" onclick="openArticle(${index})">
                            <div class="overflow-hidden bg-gray-100 mb-4">
                                <img src="${imageUrl}" 
                                     onerror="this.src='https://via.placeholder.com/800x500/f3f4f6/374151?text=Haber+Gorseli'"
                                     class="w-full h-56 object-cover grayscale hover:grayscale-0 transition duration-700 transform group-hover:scale-105">
                            </div>
                            <span class="text-[10px] font-bold text-red-900 uppercase tracking-widest">${article.source.name || 'Chronicle News'}</span>
                            <h2 class="serif text-2xl font-bold leading-tight my-2 group-hover:underline">${article.title}</h2>
                            <p class="text-sm text-gray-700 leading-relaxed line-clamp-3">${article.description || 'Haber detayları için tıklayın...'}</p>
                            <div class="mt-4 pt-2 border-t border-dotted border-gray-400 flex justify-between items-center text-[11px] text-gray-500 italic">
                                <span>Kaynak: ${article.source.name || 'Chronicle Arşiv'}</span>
                                <span class="text-blue-800 font-bold not-italic hover:underline">DETAYLARI GÖR →</span>
                            </div>
                        </article>
                    `;
                }

                liveTicker.innerHTML += `
                    <div class="border-b border-gray-100 pb-4 group cursor-pointer" onclick="openArticle(${index})">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] text-red-700 font-bold">${new Date(article.publishedAt).toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'})}</span>
                            <span class="text-[9px] uppercase text-gray-400 font-bold">${article.source.name || 'ANLIK'}</span>
                        </div>
                        <h4 class="text-sm font-semibold leading-snug group-hover:text-red-800 line-clamp-2">${article.title}</h4>
                    </div>
                `;
            });
        }

        // Sitenin boş kalmaması için her kategoriye özel ve her seferinde farklılaşan haberler üretir
        function generateDynamicMockNews(category) {
            const now = new Date();
            const hour = now.getHours();
            const minute = now.getMinutes();

            const headlines = {
                general: ["Zirvede Kritik Kararlar Alındı", "Yeni Enerji Paketi Açıklandı", "Küresel İklim Raporu Yayınlandı", "Ulaşımda Dev Reform", "Eğitimde Yeni Dönem Başlıyor"],
                business: ["Piyasalarda Haftalık Analiz", "Dev Şirketten Büyük Yatırım", "Faiz Kararı Sonrası İlk Tepkiler", "İhracat Rakamlarında Yeni Rekor", "Dijital Para Birimlerinde Hareketlilik"],
                technology: ["Yeni Nesil İşlemciler Tanıtıldı", "Yapay Zeka Mimarisinde Yenilik", "Uzay Görevinde Önemli Gelişme", "Siber Güvenlik Uyarısı", "Giyilebilir Teknolojide Devrim"],
                science: ["Mars Verilerinde Şaşırtıcı Detay", "Genetik Mühendisliğinde Yeni Buluş", "Okyanus Tabanında Keşif", "Antik Kentte Yeni Bulgular", "Fizik Dünyasını Heyecanlandıran Teori"],
                health: ["Yeni Beslenme Rehberi Yayında", "Pandemi Sonrası Bağışıklık Analizi", "Tıp Dünyasında Kanser Araştırması", "Zihinsel Sağlık İçin 5 Öneri", "Göz Sağlığına Dikkat Çekildi"],
                entertainment: ["Yılın Filmi Rekor Kırdı", "Ünlü Sanatçıdan Sürpriz Albüm", "Moda Haftasında Renkli Görüntüler", "Yeni Dizi Reytingleri Alt Üst Etti", "Tiyatro Sahnelerinde Yeni Sezon"],
                sports: ["Derbi Öncesi Son Durum", "Genç Yetenek Avrupa Yolunda", "Tenis Turnuvasında Büyük Sürpriz", "Basketbol Ligi'nde Puan Durumu", "Olimpiyat Hazırlıkları Sürüyor"]
            };

            const selectedHeadlines = headlines[category] || headlines.general;
            
            articlesList = selectedHeadlines.map((title, i) => {
                // Her haber için farklı bir dakika ve başlık oluşturur
                const pubDate = new Date();
                pubDate.setMinutes(minute - (i * 15));
                
                return {
                    title: `${title} - (${hour}:${pubDate.getMinutes() < 10 ? '0'+pubDate.getMinutes() : pubDate.getMinutes()})`,
                    description: `Bu haber, ${category} kategorisindeki son gelişmeleri içeren bir analiz raporudur. Detaylar için merkez binamızdan gelen veriler işlenmektedir.`,
                    source: { name: "Chronicle " + category.toUpperCase() },
                    urlToImage: `https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=800&q=60&sig=${i+Math.random()}`,
                    publishedAt: pubDate.toISOString(),
                    url: "https://www.google.com/search?q=" + encodeURIComponent(title)
                };
            });

            // Ek dolgu haberler
            for(let i=0; i<3; i++) {
                articlesList.push({
                    title: `${category.toUpperCase()} Dosyası: Derinlemesine İnceleme #${i+1}`,
                    description: "Editörlerimizin hazırladığı bu özel dosyada, haftanın en çok konuşulan başlıklarını bir araya getirdik.",
                    source: { name: "Editor's Pick" },
                    urlToImage: `https://images.unsplash.com/photo-1495020689067-958852a7765e?auto=format&fit=crop&w=800&q=60&sig=${i+10}`,
                    publishedAt: new Date(now - 3600000 * (i+1)).toISOString(),
                    url: "#"
                });
            }

            renderNews(articlesList);
        }

        function refreshCurrentCategory() { fetchNews(currentCategory); }
        
        // İlk yükleme
        window.onload = () => fetchNews(currentCategory);
        
        // Her 5 dakikada bir otomatik güncelleme (Sayfa açık kaldıkça yeni haber simülasyonu için)
        setInterval(refreshCurrentCategory, 300000);
    </script>
</body>
</html>
